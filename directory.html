<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PlateLogic — Hotel Prospect Directory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8f9fa;color:#333}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:32px 24px;text-align:center}
.header h1{font-size:28px;margin-bottom:6px}
.header p{font-size:14px;opacity:.85;margin-bottom:4px}
.stats-row{display:flex;justify-content:center;gap:20px;padding:20px 24px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:10px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center;min-width:120px}
.stat-card .num{font-size:28px;font-weight:700;color:#1a237e}
.stat-card .label{font-size:12px;color:#666;margin-top:2px}
.controls{padding:0 24px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.controls button{padding:6px 16px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;transition:.15s}
.controls button:hover{background:#eee}
.controls button.active{background:#1a237e;color:#fff;border-color:#1a237e}
.controls .search-box{flex:1;min-width:200px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px}
#results{font-size:13px;color:#666;padding:0 24px 12px}
table{width:100%;border-collapse:collapse;margin:0 24px}
table{width:calc(100% - 48px)} /* fixed */
th{padding:10px 12px;text-align:left;font-size:12px;text-transform:uppercase;color:#666;border-bottom:2px solid #e0e0e0;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:#1a237e}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #eee;vertical-align:middle}
tr:hover{background:#f5f5ff}
tr.hotel td:first-child{font-weight:600}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:2px}
.tag.Ireland{background:#e8f5e9;color:#2e7d32}
.tag.UK{background:#e3f2fd;color:#1565c0}
.tag.USA{background:#fce4ec;color:#c62828}
.tag.Australia{background:#fff3e0;color:#e65100}
.tag.Canada{background:#f3e5f5;color:#6a1b9a}
.tag.hotel{background:#fff8e1;color:#f57f17}
.flag{font-size:16px}
.email{color:#1a73e8;text-decoration:none}
.email:hover{text-decoration:underline}
.website{color:#1a73e8;text-decoration:none;font-size:12px;word-break:break-all}
.score-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.score-high{background:#4caf50}
.score-med{background:#ff9800}
.score-low{background:#9e9e9e}
@media(max-width:768px){
  table{width:100%;margin:0;font-size:12px}
  th,td{padding:6px 8px}
  .stats-row{gap:10px}
  .stat-card{min-width:80px;padding:12px;font-size:12px}
  .stat-card .num{font-size:20px}
}
</style>
</head>
<body>
<div class="header">
  <h1>🏨 Hotel Prospect Directory</h1>
  <p>PlateLogic — Lead generation from wedding venue data</p>
  <p style="font-size:12px;opacity:.65;margin-top:4px">Hotels with wedding/banquet capacity = highest value targets</p>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="controls">
  <button class="active" onclick="filterBy('all')">All</button>
  <button onclick="filterBy('Ireland')">🇮🇪 Ireland</button>
  <button onclick="filterBy('UK')">🇬🇧 UK</button>
  <button onclick="filterBy('hotels')">🏨 Hotels Only</button>
  <button onclick="filterBy('email')">✉️ Has Email</button>
  <input class="search-box" placeholder="Search venues..." oninput="doSearch(this.value)">
</div>

<div id="results"></div>

<table><thead><tr>
  <th onclick="sortTable(0)">Name</th>
  <th onclick="sortTable(1)">Country</th>
  <th onclick="sortTable(2)">Location</th>
  <th onclick="sortTable(3)">Lead Score</th>
  <th onclick="sortTable(4)">Contact</th>
</tr></thead><tbody id="tableBody"></tbody></table>

function stats() {
  const total = data.length;
  const hotels = data.filter(v => v.isHotel).length;
  const withEmail = data.filter(v => v.hasEmail).length;
  const ie = data.filter(v => v.country==='Ireland').length;
  const uk = data.filter(v => v.country==='UK').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Total Venues</div></div>
    <div class="stat-card"><div class="num">${hotels}</div><div class="label">Hotels</div></div>
    <div class="stat-card"><div class="num">${ie}</div><div class="label">Ireland</div></div>
    <div class="stat-card"><div class="num">${uk}</div><div class="label">UK</div></div>
    <div class="stat-card"><div class="num">${withEmail}</div><div class="label">With Email</div></div>
  `;
}

function leadScore(v) {
  let s = 5;
  if (v.isHotel) s += 3;
  if (v.hasWeddingCapacity) s += 2;
  if (v.hasEmail) s += 3;
  if (v.country === 'Ireland') s += 1; // closer to home
  return s;
}

function leadClass(s) {
  if (s >= 10) return 'score-high';
  if (s >= 7) return 'score-med';
  return 'score-low';
}

function render(items) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = items.map(v => {
    const s = leadScore(v);
    return `<tr class="${v.isHotel ? 'hotel' : ''}">
      <td><span class="flag">${countryFlag(v.country)}</span> ${esc(v.name)}${v.isHotel ? ' <span class="tag hotel">Hotel</span>' : ''}</td>
      <td><span class="tag ${v.country}">${v.country}</span></td>
      <td>${esc(v.county)}</td>
      <td><span class="score-dot ${leadClass(s)}"></span>${s}/13</td>
      <td>${v.hasEmail ? '<a class="email" href="mailto:'+esc(v.email)+'">'+esc(v.email)+'</a>' : '—'}${v.website ? '<br><a class="website" href="'+esc(v.website)+'" target="_blank">'+shortUrl(v.website)+'</a>' : ''}</td>
    </tr>`;
  }).join('');
  document.getElementById('results').textContent = items.length + ' venues shown';
}

function countryFlag(c) {
  return {Ireland:'🇮🇪',UK:'🇬🇧',USA:'🇺🇸',Australia:'🇦🇺',Canada:'🇨🇦'}[c]||'';
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function shortUrl(u){return (u||'').replace(/^https?:\/\/(www\.)?/,'').substring(0,40)}

let currentFilter = 'all', currentSearch = '';
function filterBy(f) { currentFilter=f; applyFilters(); }
function doSearch(v) { currentSearch=v.toLowerCase(); applyFilters(); }

function applyFilters() {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const btn = [...document.querySelectorAll('.controls button')].find(b => b.textContent.includes(currentFilter==='all'?'All':currentFilter==='hotels'?'Hotels Only':currentFilter==='email'?'Has Email':currentFilter));
  if (btn) btn.classList.add('active');
  
  let items = [...data];
  if (currentFilter === 'hotels') items = items.filter(v => v.isHotel);
  else if (currentFilter === 'email') items = items.filter(v => v.hasEmail);
  else if (currentFilter !== 'all') items = items.filter(v => v.country === currentFilter);
  
  if (currentSearch) items = items.filter(v => 
    v.name.toLowerCase().includes(currentSearch) || v.county.toLowerCase().includes(currentSearch) || v.country.toLowerCase().includes(currentSearch)
  );
  
  // Sort by lead score descending
  items.sort((a,b) => leadScore(b) - leadScore(a));
  render(items);
}

let sortDir = {};
function sortTable(col) {
  const body = document.getElementById('tableBody');
  const rows = [...body.querySelectorAll('tr')];
  const dir = sortDir[col] = (sortDir[col] || 'asc') === 'asc' ? 'desc' : 'asc';
  
  rows.sort((a, b) => {
    const va = a.cells[col].textContent.trim();
    const vb = b.cells[col].textContent.trim();
    return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  rows.forEach(r => body.appendChild(r));
}

stats();
applyFilters();
</script>
